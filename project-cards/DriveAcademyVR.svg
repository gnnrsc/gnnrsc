    <tspan x="18" dy="18">A Meta Quest 3 driving school</tspan>
    <tspan x="18" dy="18">application featuring a virtual</tspan>
    <tspan x="18" dy="18">instructor with realistic voice and</tspan>
    <tspan x="18" dy="18">facial expressions, designed...</tspan>
    
  </text>
</svg>