  <text x="18" y="215" class="title">
    <tspan x="18" dy="0">DriveAcademyVR</tspan>
    
  </text>
  <text x="18" y="240" class="desc">
    <tspan x="18" dy="0">A Meta Quest 3 driving school</tspan>
    <tspan x="18" dy="18">application featuring a virtual</tspan>
    <tspan x="18" dy="18">instructor with real-time vocal</tspan>
    <tspan x="18" dy="18">feedback. It integrates realistic</tspan>
    <tspan x="18" dy="18">physics, a diegetic dashboard UI,</tspan>
    <tspan x="18" dy="18">and haptic feedback to provide a</tspan>
    <tspan x="18" dy="18">safe, immersive environment for</tspan>
    <tspan x="18" dy="18">practicing road rules.</tspan>
    
  </text>
