<svg xmlns="http://www.w3.org/2000/svg" width="250" height="440" viewBox="0 0 250 440">
  <defs>
    <clipPath id="image-clip">
      <path d="M 10 0 L 240 0 A 10 10 0 0 1 250 10 L 250 180 L 0 180 L 0 10 A 10 10 0 0 1 10 0 Z" />
    </clipPath>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; font-size: 18px; fill: #58a6ff; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; font-size: 13px; fill: #8b949e; }
    </style>
  </defs>
  
  <!-- Il rettangolo di sfondo si allunga con 440 -->
  <rect x="0" y="0" width="250" height="440" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  
  <image href="" x="0" y="0" width="250" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#image-clip)"/>
  
  <line x1="0" y1="180" x2="250" y2="180" stroke="#30363d" stroke-width="1.5" />
  <text x="18" y="215" class="title">mlvm-noise-remover</text>
  <text x="18" y="235" class="desc">
    <tspan x="18" dy="18">Engineered an advanced Self-</tspan>
    <tspan x="18" dy="18">Supervised Learning system for</tspan>
    <tspan x="18" dy="18">audio denoising using a 20-layer</tspan>
    <tspan x="18" dy="18">Deep Complex U-Net. By implementing</tspan>
    <tspan x="18" dy="18">the Noise2Noise methodology, the</tspan>
    <tspan x="18" dy="18">model learns to reconstruct high-</tspan>
    <tspan x="18" dy="18">quality musical signals training</tspan>
    <tspan x="18" dy="18">exclusively on noisy data,</tspan>
    <tspan x="18" dy="18">overcoming the lack of clean</tspan>
    <tspan x="18" dy="18">datasets.</tspan>
    
  </text>
</svg>