  <text y="103" class="desc"><tspan x="410" dy="0">Developed a high-fidelity <tspan fill="#e5c07b">VR</tspan> <tspan fill="#e5c07b">Digital</tspan> <tspan fill="#e5c07b">Twin</tspan> of an</tspan>
