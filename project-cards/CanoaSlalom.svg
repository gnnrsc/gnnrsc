<svg xmlns="http://www.w3.org/2000/svg" width="250" height="386" viewBox="0 0 250 386">
  <defs>
    <clipPath id="image-clip">
      <path d="M 10 0 L 240 0 A 10 10 0 0 1 250 10 L 250 180 L 0 180 L 0 10 A 10 10 0 0 1 10 0 Z" />
    </clipPath>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; font-size: 18px; fill: #58a6ff; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; font-size: 13px; fill: #8b949e; }
    </style>
  </defs>
  
  <!-- Il rettangolo di sfondo si allunga con 386 -->
  <rect x="0" y="0" width="250" height="386" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  
  <image href="" x="0" y="0" width="250" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#image-clip)"/>
  
  <line x1="0" y1="180" x2="250" y2="180" stroke="#30363d" stroke-width="1.5" />
  <text x="18" y="215" class="title">CanoaSlalom</text>
  <text x="18" y="235" class="desc">
    <tspan x="18" dy="18">AI-based analysis of athlete</tspan>
    <tspan x="18" dy="18">trajectories at the Ivrea Canoa</tspan>
    <tspan x="18" dy="18">Club slalom stadium. Implemented</tspan>
    <tspan x="18" dy="18">YOLO (Ultralytics) for real-time</tspan>
    <tspan x="18" dy="18">tracking and detection to evaluate</tspan>
    <tspan x="18" dy="18">performance and provide technical</tspan>
    <tspan x="18" dy="18">support for athletes.</tspan>
    
  </text>
</svg>